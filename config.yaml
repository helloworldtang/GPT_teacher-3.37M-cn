data:
  train_path: data/train_simple_6.jsonl
  val_path: data/val_clean.jsonl
model:
  dropout: 0.2
  n_embd: 256
  n_head: 4
  n_layer: 4
  seq_len: 128
tokenizer:
  path: tokenizer/tokenizer.json
  type: hf_tokenizers
training:
  batch_size: 16
  early_stopping_patience: 10
  eval_interval: 20
  lr: 0.001
  max_steps: 200
  micro_batch: 4
  save_dir: checkpoints
  seed: 42
  warmup_steps: 20
  weight_decay: 0.01
