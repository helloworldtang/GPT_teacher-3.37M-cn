data:
  train_path: data/train_final_500_complete.jsonl
  val_path: data/val.jsonl
model:
  dropout: 0.1
  n_embd: 384
  n_head: 6
  n_layer: 6
  seq_len: 256
tokenizer:
  path: tokenizer/tokenizer.json
  type: hf_tokenizers
training:
  batch_size: 32
  early_stopping_patience: 50
  eval_interval: 200
  lr: 0.001
  max_steps: 15000
  micro_batch: 4
  save_dir: checkpoints
  seed: 42
  warmup_steps: 200
  weight_decay: 0.01
